<!doctype html>
<html>
<body>
<h2>LeadForge</h2>

<form id="f">
<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="Phone"><br>
<input id="city" placeholder="City"><br>
<input id="service" placeholder="Service"><br>
<button>Submit</button>
</form>

<pre id="o"></pre>

<script>
const API="https://leadforge-llc.onrender.com/lead";

document.getElementById("f").onsubmit = async (e) => {
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    city: document.getElementById("city").value,
    service: document.getElementById("service").value
  };

  const r = await fetch(API, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });

  const d = await r.json();
  document.getElementById("o").innerText = JSON.stringify(d, null, 2);
};
</script>
</body>
</html>
