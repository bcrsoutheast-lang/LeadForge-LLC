<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeadForge | Exclusive Contractor Requests</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0b0b0b;
      color: #f5f5f5;
      line-height: 1.5;
    }

    a { text-decoration: none; color: inherit; }

    .container {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 20px;
    }

    header {
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(17,17,17,0.96);
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(10px);
    }

    .nav {
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      padding: 14px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      font-size: 1.2rem;
      color: #ffffff;
    }

    .brand img {
      height: 48px;
      width: auto;
      display: block;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nav-link {
      color: #e8e8e8;
      font-size: 0.95rem;
      padding: 10px 14px;
      border-radius: 10px;
      transition: 0.2s ease;
    }

    .nav-link:hover {
      background: rgba(255,255,255,0.08);
    }

    .btn {
      display: inline-block;
      padding: 13px 20px;
      border-radius: 12px;
      font-weight: 700;
      transition: 0.2s ease;
      text-align: center;
      border: none;
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(135deg, #d4af37, #b8860b);
      color: #111111;
      box-shadow: 0 8px 24px rgba(212,175,55,0.22);
    }

    .btn-secondary {
      background: transparent;
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .hero {
      padding: 82px 0 52px;
      background:
        radial-gradient(circle at top left, rgba(212,175,55,0.18), transparent 32%),
        radial-gradient(circle at top right, rgba(220,38,38,0.16), transparent 28%),
        linear-gradient(180deg, #111111 0%, #0b0b0b 100%);
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    section { padding: 70px 0; }

    footer {
      border-top: 1px solid rgba(255,255,255,0.08);
      background: #0f0f0f;
      padding: 22px 0;
      color: #9f9f9f;
      font-size: 0.92rem;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <div class="container nav">
    <a href="/" class="brand">
      <img src="/static/IMG_2026.png" alt="LeadForge Logo" />
      <span>LeadForge</span>
    </a>

    <div class="nav-links">
      <a href="/" class="nav-link">Home</a>
      <a href="/services" class="nav-link">Services</a>
      <a href="/join-contractor" class="nav-link">Join</a>

      <!-- ✅ FIXED ADMIN LINK -->
      <a href="/admin" class="nav-link">Admin</a>
    </div>
  </div>
</header>

<section class="hero">
  <div class="container">
    <h1>Find the Right Contractor for Your Project</h1>
    <p>
      Browse vetted contractors, choose one, and send one exclusive request directly.
    </p>

    <div>
      <a href="/services" class="btn btn-primary">Find a Contractor</a>
      <a href="/join-contractor" class="btn btn-secondary">Join as a Contractor</a>
    </div>
  </div>
</section>

<footer>
  <div class="container">
    LeadForge connects homeowners with vetted contractors through exclusive direct requests.
  </div>
</footer>

</body>
</html>
