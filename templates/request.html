<!DOCTYPE html>
<html>
<head>
  <title>Request Contractor</title>
  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0b0b0b;
      color:#f5f5f5;
    }

    .container {
      max-width:600px;
      margin:60px auto;
      padding:30px;
      background:#111;
      border-radius:12px;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      text-align:center;
      color:#cc0000;
      margin-bottom:10px;
    }

    .sub {
      text-align:center;
      margin-bottom:25px;
      color:#aaa;
    }

    label {
      display:block;
      margin-top:15px;
      font-weight:bold;
    }

    input, textarea {
      width:100%;
      padding:10px;
      margin-top:5px;
      border:none;
      border-radius:6px;
      background:#1a1a1a;
      color:white;
    }

    textarea {
      height:100px;
    }

    button {
      margin-top:25px;
      width:100%;
      padding:12px;
      background:#cc0000;
      color:white;
      border:none;
      border-radius:8px;
      font-size:16px;
      cursor:pointer;
    }

    button:hover {
      background:#a30000;
    }

    .top {
      text-align:center;
      margin-bottom:15px;
      color:#d4af37;
      font-weight:bold;
    }

    .back {
      display:block;
      text-align:center;
      margin-top:20px;
      color:#d4af37;
      text-decoration:none;
    }

  </style>
</head>
<body>

<div class="container">

  <div class="top">
    Contractor ID: {{ contractor_id }}
  </div>

  <h1>Request Contractor</h1>
  <div class="sub">Send your request directly — no bidding, no spam</div>

  <form method="POST" action="/request/{{ contractor_id }}">

    <label>Full Name</label>
    <input type="text" name="owner_name" required>

    <label>Phone</label>
    <input type="text" name="phone" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Service Needed</label>
    <input type="text" name="service" required>

    <label>City</label>
    <input type="text" name="city" required>

    <label>State</label>
    <input type="text" name="state" required>

    <label>ZIP CODE</label>
    <input type="text" name="zip" required>

    <label>Project Details</label>
    <textarea name="project_details" required></textarea>

    <button type="submit">Submit Request</button>

  </form>

  <a href="/services" class="back">← Back to Services</a>

</div>

</body>
</html>
