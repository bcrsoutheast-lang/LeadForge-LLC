<!DOCTYPE html>
<html>
<head>
  <title>Join LeadForge</title>
</head>
<body style="background:#111;color:white;font-family:Arial;padding:40px">

<h1>Join as a Contractor</h1>

<form method="POST" action="/join-contractor">

<label>Company Name</label><br>
<input type="text" name="company_name" required><br><br>

<label>Contact Name</label><br>
<input type="text" name="contact_name" required><br><br>

<label>Phone</label><br>
<input type="text" name="phone" required><br><br>

<label>Email</label><br>
<input type="email" name="email" required><br><br>

<label>City</label><br>
<input type="text" name="city" required><br><br>

<label>State</label><br>
<input type="text" name="state" required><br><br>

<label>ZIP CODE</label><br>
<input type="text" name="zip" required><br><br>

<label>Service Area</label><br>
<input type="text" name="service_area" required><br><br>

<label>Website</label><br>
<input type="text" name="website"><br><br>

<label>Business Description</label><br>
<textarea name="bio" required></textarea><br><br>

<h3>Select Services</h3>

<input type="checkbox" name="services" value="roofing"> Roofing<br>
<input type="checkbox" name="services" value="hvac"> HVAC<br>
<input type="checkbox" name="services" value="plumbing"> Plumbing<br>
<input type="checkbox" name="services" value="electrical"> Electrical<br>
<input type="checkbox" name="services" value="remodeling"> Remodeling<br>
<input type="checkbox" name="services" value="fencing"> Fencing<br>
<input type="checkbox" name="services" value="soft-washing"> Soft Washing<br>
<input type="checkbox" name="services" value="landscaping"> Landscaping<br>
<input type="checkbox" name="services" value="handyman"> Handyman<br>
<input type="checkbox" name="services" value="junk-removal"> Junk Removal<br>
<input type="checkbox" name="services" value="pest-control"> Pest Control<br>
<input type="checkbox" name="services" value="cleaning"> Cleaning<br><br>

<label>
<input type="checkbox" name="disclaimer" required>
I understand submitting this does not guarantee approval.
</label><br><br>

<button type="submit">Submit Application</button>

</form>

</body>
</html>
